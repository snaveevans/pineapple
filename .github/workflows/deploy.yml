name: Deploy

# Auto-deploy whenever main advances (i.e. when you merge a PR). Each app
# (apps/api, apps/web) deploys only when its files — or a shared dependency —
# changed. Also runnable on demand from the Actions tab, which deploys both.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Re-verify on main before shipping. Direct pushes to main skip PR checks,
  # so this guarantees we never deploy red code.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm type-check
      - name: Test
        run: pnpm -r test
      - name: Check OpenAPI spec is up to date
        run: |
          pnpm --filter @snaveevans/pineapple-api openapi:generate
          git diff --exit-code docs/reference/openapi.json

  # Detect which app(s) changed so we only redeploy what moved. Shared changes
  # (root config, the lockfile, packages/shared, this workflow) fan out to both.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Only meaningful on push (needs a base to diff against). On manual
      # dispatch this step is skipped and both deploy jobs run via the
      # event_name guard below.
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            shared: &shared
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'tsconfig.json'
              - 'packages/shared/**'
              - '.github/workflows/deploy.yml'
            api:
              - *shared
              - 'apps/api/**'
              - 'migrations/**'
            web:
              - *shared
              - 'apps/web/**'

  deploy-api:
    needs: [verify, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cloudflare credentials are present
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Reject production development auth bypass
        working-directory: apps/api
        run: |
          secrets="$(pnpm wrangler secret list --format json)"
          if ! jq -e \
            'type == "array" and all(.[]; type == "object" and ((.name | type) == "string"))' \
            <<<"$secrets" >/dev/null; then
            echo "::error::Unable to validate the production Worker secret list"
            exit 1
          fi
          if jq -e 'any(.[]; .name == "DEV_AUTH_EMAIL")' <<<"$secrets" >/dev/null; then
            echo "::error::DEV_AUTH_EMAIL is configured on the production Worker"
            exit 1
          fi

      # Apply any pending D1 migrations to production first, so the schema is
      # ready before the new code goes live. CI=true makes wrangler
      # non-interactive; it reads the CLOUDFLARE_* env vars for auth.
      - name: Apply D1 migrations (production)
        working-directory: apps/api
        run: pnpm wrangler d1 migrations apply pineapple --remote

      - name: Deploy Worker
        working-directory: apps/api
        run: pnpm wrangler deploy

  deploy-web:
    needs: [verify, changes]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cloudflare credentials are present
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      # Build the SPA (writes the redirect config wrangler deploy reads), then
      # deploy the Worker that serves it.
      - name: Build
        working-directory: apps/web
        run: pnpm build

      - name: Deploy Worker
        working-directory: apps/web
        run: pnpm wrangler deploy
