name: CI

# Runs on every PR and on pushes to main. These are the checks you can require
# before a PR can be merged — so merging from your phone stays safe.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5 # version comes from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm -r test

      # Gate-logic selftest for the mutation path filter (ADR-0016). Cheap; runs
      # on every PR so a regex typo cannot silently widen/narrow the trust boundary.
      - name: Mutation scope selftest
        run: .github/scripts/mutation-scope.selftest.sh

      # The committed OpenAPI spec must match what the code generates, so the
      # static file (read by codebase tools) never drifts from the live API.
      - name: Check OpenAPI spec is up to date
        run: |
          pnpm --filter @snaveevans/pineapple-api openapi:generate
          git diff --exit-code docs/reference/openapi.json
