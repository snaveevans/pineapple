name = "pineapple-api"
main = "src/worker.ts"
compatibility_date = "2026-05-21"
# Better Auth relies on Node APIs (crypto, etc.) on the Workers runtime.
compatibility_flags = ["nodejs_compat"]

# Production routes on the shared hostname. The API owns /api/* plus its
# (non-/api) docs + health endpoints; the web Worker (pineapple-web) owns the
# catch-all /* for the SPA. Cloudflare matches the most specific route, so
# /api/* and the explicit paths below win over the SPA's /*.
# Requires the tylerevans.co zone in this Cloudflare account and a proxied DNS
# record for pineapple.tylerevans.co. Routes are ignored by `wrangler dev`.
routes = [
  { pattern = "pineapple.tylerevans.co/api/*", zone_name = "tylerevans.co" },
  { pattern = "pineapple.tylerevans.co/openapi.json", zone_name = "tylerevans.co" },
  { pattern = "pineapple.tylerevans.co/reference", zone_name = "tylerevans.co" },
  { pattern = "pineapple.tylerevans.co/health", zone_name = "tylerevans.co" },
]

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["*/15 * * * *"]

# Auth config is provided as SECRETS (not committed here):
#   wrangler secret put BETTER_AUTH_SECRET
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
# Locally these live in apps/api/.dev.vars (gitignored).

[[d1_databases]]
binding = "DB"
database_name = "pineapple"
database_id = "9187de54-a0ee-49c4-8d84-954df8010366"
# Tracked migrations (applied via `wrangler d1 migrations apply`). Path is
# relative to this config file -> repo-root /migrations.
migrations_dir = "../../migrations"

[[analytics_engine_datasets]]
binding = "ASSET_DOMAIN_TELEMETRY"
dataset = "pineapple_asset_domain_events"

[[analytics_engine_datasets]]
binding = "USER_DOMAIN_TELEMETRY"
dataset = "pineapple_user_domain_events"

[[analytics_engine_datasets]]
binding = "MAINTENANCE_DOMAIN_TELEMETRY"
dataset = "pineapple_maintenance_domain_events"

[[analytics_engine_datasets]]
binding = "MAINTENANCE_TASK_DOMAIN_TELEMETRY"
dataset = "pineapple_maintenance_task_domain_events"

[[analytics_engine_datasets]]
binding = "API_REQUEST_TELEMETRY"
dataset = "pineapple_api_request_events"

[[queues.producers]]
binding = "ACTIVITY_HISTORY_QUEUE"
queue = "pineapple-activity-history"

[[queues.consumers]]
queue = "pineapple-activity-history"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "pineapple-activity-history-dlq"

[[queues.consumers]]
queue = "pineapple-activity-history-dlq"
max_batch_size = 10
max_batch_timeout = 5
# Terminal DLQ: if D1 dead-letter persistence fails through these retries,
# ActivityQueueConsumer emits a terminal error log before the platform exhausts
# the message. Chaining another DLQ would only move the same D1 outage edge.
max_retries = 3
